<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMADESTINO | Diseño Dinámico</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@0,900;1,900&family=Montserrat:wght@900&family=Bebas+Neue&family=Pacifico&family=Lora:wght@700&family=Syncopate:wght@700&family=Oswald:wght@700&family=Caveat:wght@700&family=Fraunces:opsz,soft,wght@9,100,900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        themeBg: 'var(--bg-color)',
                        themeText: 'var(--text-color)',
                        themeAccent: 'var(--accent-color)',
                    }
                }
            }
        }
    </script>

    <style>
        :root[data-theme="light"] { --bg-color: #F5F9F0; --text-color: #18536d; --accent-color: #d1f581; }
        :root[data-theme="dark"] { --bg-color: #18536d; --text-color: #F5F9F0; --accent-color: #d1f581; }
        :root[data-theme="lime"] { --bg-color: #d1f581; --text-color: #18536d; --accent-color: #F5F9F0; }

        body { background-color: var(--bg-color); color: var(--text-color); transition: all 0.4s ease; overflow-x: hidden; }
        
        /* Flechas invisibles pero funcionales */
        .invisible-arrow {
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .hero-title-container:hover .invisible-arrow { opacity: 0.3; }
        
        /* Video background styling */
        .video-docker video {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            object-fit: cover;
        }
        .video-overlay { background: rgba(0,0,0,0.4); }

        /* Custom Scrollbar para el menú de fuentes */
        .font-menu::-webkit-scrollbar { width: 4px; }
        .font-menu::-webkit-scrollbar-thumb { background: #d1f581; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center py-4 px-8 border-b border-opacity-10 border-themeText sticky top-0 bg-themeBg/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-3 relative group">
            <img src="https://raw.githubusercontent.com/adsmarketingpro/sumadestino/refs/heads/main/1777485244949.png" class="w-10 h-10 object-contain">
            
            <div class="relative">
                <button onclick="toggleFontMenu()" id="headerName" class="text-xl font-bold uppercase tracking-widest cursor-pointer hover:text-themeAccent transition-all flex items-center gap-2">
                    SUMADESTINO
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                </button>
                
                <div id="fontMenu" class="hidden absolute top-full left-0 mt-2 w-64 bg-white shadow-2xl rounded-xl border border-gray-100 font-menu max-h-80 overflow-y-auto py-2 z-[60]">
                    </div>
            </div>
        </div>

        <div class="hidden md:flex gap-2">
            <button onclick="setTheme('light')" class="w-4 h-4 rounded-full bg-[#F5F9F0] border border-gray-300"></button>
            <button onclick="setTheme('dark')" class="w-4 h-4 rounded-full bg-[#18536d] border border-gray-300"></button>
            <button onclick="setTheme('lime')" class="w-4 h-4 rounded-full bg-[#d1f581] border border-gray-300"></button>
        </div>

        <nav class="hidden md:flex items-center gap-8 text-xs font-bold">
            <a href="#" class="hover:text-themeAccent">COMUNIDAD</a>
            <a href="#" class="hover:text-themeAccent">¿QUIÉNES SOMOS?</a>
            <a href="#" class="bg-themeText text-themeBg px-4 py-2 rounded-full">CONTACTO</a>
        </nav>
    </header>

    <section class="relative h-[80vh] flex flex-col items-center justify-center text-center text-white overflow-hidden video-docker">
        <video class="absolute z-10" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-beautiful-aerial-shot-of-the-sea-and-mountains-1279-large.mp4" type="video/mp4">
        </video>
        
        <div class="absolute inset-0 video-overlay z-20"></div>

        <div class="relative z-30 px-4 hero-title-container flex items-center justify-center w-full max-w-6xl">
            <button onclick="changeHeroFont(-1)" class="invisible-arrow p-4 text-5xl">❮</button>
            
            <div class="flex-1">
                <h1 id="heroTitle" class="text-6xl md:text-9xl font-black uppercase tracking-tighter mb-4 transition-all duration-500" style="font-family: 'Inter';">
                    Sumadestino
                </h1>
                <p class="text-xl md:text-2xl font-light italic opacity-90">La experiencia que mereces</p>
            </div>

            <button onclick="changeHeroFont(1)" class="invisible-arrow p-4 text-5xl">❯</button>
        </div>

        <button class="relative z-30 mt-12 bg-[#d1f581] text-[#18536d] px-10 py-4 rounded-full font-bold text-lg hover:scale-110 transition-transform flex items-center gap-3">
            EMPEZAR <span class="text-2xl">✈</span>
        </button>
    </section>

    <footer class="py-12 text-center opacity-50 text-xs">
        <p>© 2026 SUMADESTINO - MODO EXPERTO ACTIVADO</p>
    </footer>

    <script>
        // Configuración de fuentes (Tipografías que puedes probar)
        const fonts = [
            { name: 'Inter', family: "'Inter', sans-serif" },
            { name: 'Elegante', family: "'Playfair Display', serif" },
            { name: 'Moderna', family: "'Montserrat', sans-serif" },
            { name: 'Impacto', family: "'Bebas Neue', cursive" },
            { name: 'Script', family: "'Pacifico', cursive" },
            { name: 'Clásica', family: "'Lora', serif" },
            { name: 'Futurista', family: "'Syncopate', sans-serif" },
            { name: 'Condensada', family: "'Oswald', sans-serif" },
            { name: 'Manuscrita', family: "'Caveat', cursive" },
            { name: 'Vintage', family: "'Fraunces', serif" }
        ];

        let currentHeroFontIndex = 0;

        // 1. Lógica del Hero (Carrusel)
        function changeHeroFont(direction) {
            currentHeroFontIndex = (currentHeroFontIndex + direction + fonts.length) % fonts.length;
            const heroTitle = document.getElementById('heroTitle');
            heroTitle.style.fontFamily = fonts[currentHeroFontIndex].family;
            console.log("Fuente Hero: " + fonts[currentHeroFontIndex].name);
        }

        // 2. Lógica del Header (Menú Desplegable)
        const fontMenu = document.getElementById('fontMenu');
        
        function toggleFontMenu() {
            fontMenu.classList.toggle('hidden');
        }

        function setupHeaderFontMenu() {
            fonts.forEach(font => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-4 py-3 hover:bg-gray-100 transition-colors text-gray-800 border-b border-gray-50 last:border-0";
                btn.style.fontFamily = font.family;
                btn.innerHTML = `<span class="text-xs text-gray-400 block font-sans uppercase">${font.name}</span> Sumadestino`;
                btn.onclick = () => {
                    document.getElementById('headerName').style.fontFamily = font.family;
                    toggleFontMenu();
                };
                fontMenu.appendChild(btn);
            });
        }

        // Cerrar menú si haces clic afuera
        window.onclick = function(event) {
            if (!event.target.closest('#headerName') && !event.target.closest('#fontMenu')) {
                fontMenu.classList.add('hidden');
            }
        }

        function setTheme(t) { document.documentElement.setAttribute('data-theme', t); }

        // Inicializar
        setupHeaderFontMenu();
    </script>
</body>
</html>
